name: RonLobby
version: 1.0.0
main: com.ron.lobby.RonLobby
api-version: '1.20'
description: Lobby plugin for the Reign of Nether community server system
author: Soly

commands:
  queue:
    description: Join the matchmaking queue
  leave:
    description: Leave the matchmaking queue
  spectate:
    description: Watch a running match
    usage: /spectate <instance>
  leaderboard:
    description: Show top 10 players
  rank:
    description: Show your stats
  vote:
    description: Vote for a map (and mode, if the map has multiple) during countdown
    usage: /vote <number> [mode]
  matches:
    description: View running matches and available servers
  menu:
    description: Open the lobby menu (hub, vote, private, matches, leaderboard, rank)
    usage: /menu [vote|private|matches|leaderboard|rank]
    aliases: [hub, lobby]
  ronstatus:
    description: Show server status (OP only)
    permission: ron.status

permissions:
  ron.status:
    description: View RoN server status
    default: op
